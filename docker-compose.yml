services:
  backend:
    build:
      context: .
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      - CLV_PROJECT_ROOT=/app
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      - HIGH_VALUE_QUANTILE=0.8
      - ENABLE_MLFLOW=true
      - MLFLOW_TRACKING_URI=file:///app/mlruns
      - USE_MLFLOW_MODELS=false
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./backend/models:/app/models
      - ./mlruns:/app/mlruns

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - backend
